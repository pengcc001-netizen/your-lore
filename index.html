</head><body><div id="root"></div><noscript><div style="padding:40px;max-width:800px;margin:0 auto;font-family:system-ui,sans-serif;color:#e0e0e0;background:#1A1410"><h1>Your Lore - Discover Your Character Lore & Fantasy Archetype</h1><p>Your Lore is a fantasy RPG-style character builder that turns your personality into an epic character backstory. Answer twelve questions and receive a complete character sheet with an archetype, signature abilities, six core stats, a fatal flaw, signature item, and a personal quest. Explore eight archetypes and eighty-plus abilities drawn from original fantasy worldbuilding.</p><h2>What We Offer</h2><p>The builder assigns you an archetype such as The Chosen One, The Trickster, or The Hermit, then pairs it with unique abilities, allies, enemies, and a backstory written in the voice of a lorekeeper. Every archetype includes stats for strength, wisdom, charisma, cunning, resilience, and magic. The Lorekeeper blog shares deeper worldbuilding notes and writing behind the archetypes.</p><h2>Popular Categories</h2><ul><li>Archetypes - eight character archetypes with backstories, stats, and fatal flaws</li><li>Abilities - eighty-plus signature powers tied to each archetype</li><li>Character Sheet - your full generated lore with quest and allies</li><li>Lorekeeper Blog - worldbuilding essays and archetype writing</li></ul><h2>About</h2><p>Built by Elena Marchetti as a free, no-sign-up tool for writers, roleplayers, and anyone who wants to see themselves as a fantasy protagonist. The archetype and ability library is free to browse.</p><p><a href="/">Visit Your Lore</a> - Free online character builder, no sign-up required.</p></div></noscript><script type="module" src="/src/main.tsx"></script></body></html>
